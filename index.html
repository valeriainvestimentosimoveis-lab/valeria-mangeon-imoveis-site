<!DOCTYPE html>

<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
overflow:hidden;
}

.container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
}

iframe{
position:absolute;
top:-60px;
left:0;
width:100%;
height:calc(100% + 120px);
border:none;
}

</style>

</head>

<body>

<div class="container">

<iframe src="valeria.pdf"></iframe>

</div>

</body>

</html>
